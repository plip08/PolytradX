global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'polymarket-bot-monitor'

scrape_configs:
  - job_name: 'polymarket-bot'
    static_configs:
      - targets: ['backend:3000']
        labels:
          service: 'backend'
          environment: 'production'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'system-metrics'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/alert_rules.yml
